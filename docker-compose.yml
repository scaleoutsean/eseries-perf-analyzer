services:

  collector:
    image: collector:${TAG}
    # image: ghcr.io/scaleoutsean/eseries-perf-analyzer/collector:4.0.0beta2 # example of using GHCR image instead of building locally
    container_name: collector
    build: ./
    mem_limit: 256m
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: 10m
    ports:
      - "9080:9080"
    environment: 
      - USERNAME=monitor
      - PASSWORD=monitor123  # non-production pass, thank you very much
      - API=192.168.1.194
      - API_PORT=8443
      - DEBUG=false
      - TLS_VERIFY=false
      - COLLECTION_INTERVAL=120
      - PROMETHEUS_PORT=${PROMETHEUS_PORT:-9080}
      - REQUESTS_CA_BUNDLE=/certs/ca.crt
      - GRPC_DEFAULT_SSL_ROOTS_FILE_PATH=/certs/ca.crt
    volumes:
      - ./certs/_master/ca.crt:/certs/ca.crt:ro
    networks:
      - eseries_perf_analyzer

  grafana:
    image: grafana:13.0-ubuntu
    container_name: grafana
    build:
      context: ./grafana/
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3443}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_PROTOCOL: https
      GF_SERVER_CERT_FILE: /etc/grafana/certs/grafana.crt
      GF_SERVER_CERT_KEY: /etc/grafana/certs/grafana.key
      GF_SERVER_ROOT_URL: https://localhost:${GRAFANA_PORT:-3443}
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "false"
      GF_PLUGINS_PREINSTALL_SYNC: victoriametrics-metrics-datasource
      GF_DATABASE_SSL_MODE: "enable"
      GF_PLUGIN_ENABLE_ALPHA: "true"
    volumes:
      - ./certs/_master/ca.crt:/usr/local/share/ca-certificates/ca.crt:ro
      - ./certs/grafana:/etc/grafana/certs:ro
      - ./data/grafana:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - vm
    networks:
      eseries_perf_analyzer:
        aliases:
          - grafana

  grafana-init:
    image: grafana-init:${TAG}
    # image: ghcr.io/scaleoutsean/eseries-perf-analyzer/grafana-init:4.0.0beta2 # example of using GHCR image instead of building locally
    profiles: ["init"]
    build: 
      context: ./grafana-init
    container_name: grafana-init
    mem_limit: 128M
    depends_on:
      - grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GRAFANA_USER=${GRAFANA_ADMIN_USER:-admin}
      - GRAFANA_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GRAFANA_URL=https://grafana:3000
      - GF_PLUGINS_PREINSTALL_SYNC=victoriametrics-metrics-datasource
      - REQUESTS_CA_BUNDLE=/certs/ca.crt
      - GRPC_DEFAULT_SSL_ROOTS_FILE_PATH=/certs/ca.crt
    volumes:
      - ./certs/_master/ca.crt:/certs/ca.crt:ro
    networks:
      - eseries_perf_analyzer
    restart: "no"

  vm:
    image: victoriametrics/victoria-metrics:latest
    container_name: vm
    # ports:  # Grafana users will just use Grafana and not VM, but if you require access to VM, uncomment this section
    #  - "8428:8428"
    volumes:
      - ./certs/vm:/etc/victoria-metrics:ro
      - ./vm/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/vm:/storage
    command:
      - "-storageDataPath=/storage"
      - "-promscrape.config=/etc/prometheus/prometheus.yml"
      - "-retentionPeriod=3" # 3 months retention
      - '-tls'
      - '-tlsCertFile=/etc/victoria-metrics/vm.crt'
      - '-tlsKeyFile=/etc/victoria-metrics/vm.key'
    networks:
      - eseries_perf_analyzer
    restart: unless-stopped


  # -- WORKLOAD CALIBRATION --
  # A synthetic fio workload generator for validating metrics in Grafana.
  # Run this manually via:  sudo docker compose --profile test up fio-test
  fio-test:
    image: dmonakhov/alpine-fio:latest
    container_name: epa-fio-tester
    profiles: ["test"]
    volumes:
      # Change this path to match your SANtricity mount point!
      - ./data/fio_test_mnt:/mnt/santricity:rw
    # 8k block size, strictly throttled to 10 IOPS
    command: >
      fio --name=test-workload --filename=/mnt/santricity/test.img 
      --size=50M --rw=randrw --bs=8k --ioengine=libaio 
      --direct=1 --rate_iops=10 --time_based --runtime=3600
    networks:
      - eseries_perf_analyzer

networks:
  eseries_perf_analyzer:
    driver: bridge
