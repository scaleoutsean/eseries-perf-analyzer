name: Python Application Test

on:
  push:
    branches: [ "main", "master", "feat_*" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f epa/requirements.txt ]; then pip install -r epa/requirements.txt; fi

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 epa --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 epa --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check for Python syntax errors
      run: |
        python -m compileall epa/collector.py

